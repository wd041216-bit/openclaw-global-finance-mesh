version: "3.9"

services:
  finance-mesh:
    build:
      context: .
      dockerfile: Dockerfile
    image: zhouheng-global-finance-mesh:local
    ports:
      - "${FINANCE_MESH_PORT:-3030}:3030"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FINANCE_MESH_PORT: 3030
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3030/api/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
