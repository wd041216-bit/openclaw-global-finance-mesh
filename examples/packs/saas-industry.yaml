source_of_truth:
  - source_id: IND-SAAS-001
    source_type: group_policy
    title: SaaS revenue recognition baseline
    uri_or_registry_ref: policy://group/revenue/saas
    retrieved_at: "2026-03-20T09:00:00+08:00"
approval:
  required_roles:
    - finance
    - tax
    - internal_control
    - system_owner
  approved_by:
    - Revenue Accounting Lead
  approved_at: "2026-03-24T16:00:00+08:00"
  rollback_version: 0.9.0
test_requirements:
  min_pass_rate: 0.96
  required_scenarios:
    - happy_path
