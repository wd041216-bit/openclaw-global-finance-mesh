industry_profile:
  revenue_patterns:
    - annual_subscription
    - monthly_subscription
rules:
  - rule_id: SAAS-REV-001
    title: Annual SaaS prepayments defer to contract liability first
    intent: Recognize annual SaaS prepayments as contract liability, then amortize monthly through the service period.
    scope:
      all:
        - field: industry_code
          op: eq
          value: SAAS
        - field: event_type
          op: eq
          value: customer_cash_received
        - field: sub_event_type
          op: eq
          value: annual_subscription_prepayment
      any: []
      not: []
    conditions:
      preconditions:
        - field: contract_signed
          op: eq
          value: true
        - field: service_period.start
          op: exists
          value: true
      blocking_conditions: []
      warning_conditions:
        - field: pricing_schedule
          op: missing
          value: true
    actions:
      account_mapping:
        booking_policy: cash receipt before service start -> contract liability
        initial_receipt:
          debit: bank
          credit: contract_liability
        recognition_method: ratable_monthly
      evidence_requirements:
        - signed_contract
        - service_period
        - pricing_schedule
        - cash_receipt
      control_hooks:
        - contract_boundary_check
        - performance_obligation_check
        - document_completeness_check
      approval_route:
        default:
          - revenue_accounting
      execution_policy:
        mode: recommend
      output_templates:
        - revenue_schedule
        - initial_receipt_journal
      notifications: []
    risk_model:
      risk_level: medium
      risk_reasons:
        - revenue_timing
        - service_period_dependency
      confidence_formula_ref: CF-SAAS-REV-001
    explanation_template: Annual prepayments land as contract liability until service is delivered.
    rollback:
      supported: true
      rollback_steps:
        - reverse_initial_receipt_journal
        - cancel_unposted_revenue_schedule
      data_compensation_actions: []

