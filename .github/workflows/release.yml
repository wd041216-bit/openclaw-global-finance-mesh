name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag in semver form, for example v0.3.0"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${RELEASE_TAG#v}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Create disposable kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: finance-mesh-release

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate release metadata
        run: npm run release:check -- --tag "${{ steps.release_meta.outputs.release_tag }}"

      - name: Run node tests
        run: npm test

      - name: Verify server syntax
        run: npm run verify:server

      - name: Verify Kubernetes manifests
        run: npm run verify:manifests

      - name: Smoke restore flow
        run: npm run smoke:restore

      - name: Smoke browser flow
        run: npm run smoke:ui

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/wd041216-bit/zhouheng-global-finance-mesh:${{ steps.release_meta.outputs.version }}
            ghcr.io/wd041216-bit/zhouheng-global-finance-mesh:latest

      - name: Publish npm package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
